version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: digital_city_db
    environment:
      POSTGRES_USER: digital_city_user
      POSTGRES_PASSWORD: digital_city_password
      POSTGRES_DB: digital_city
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgis_data:
